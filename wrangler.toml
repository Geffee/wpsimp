name = "wpsimpmoyu2"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# 提高单次 Worker 调用的子请求上限（大表分块导入时仍有帮助；免费档会被钳制在50，前端已做分块兜底）
[limits]
cpu_ms = 100
subrequests = 1000

# ⚠️ D1 / KV 绑定不在此处配置，改为在 Cloudflare Pages 后台手动绑定。
# 后台路径：Pages 项目 wpsimpmoyu2 → Settings → Bindings（或 Functions → 绑定）
# 需要配置以下两个绑定（binding 名必须与代码中的 env.DB / env.SITE_KV 严格一致）：
#   - D1 database：binding 名 = DB      （选择目标数据库，如 wps-import-db）
#   - KV namespace：binding 名 = SITE_KV （选择目标 KV，如原 SITE_KV）
