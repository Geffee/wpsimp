name = "wpsimpmoyu2"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# 提高单次 Worker 调用的子请求上限（大表分块导入时仍有帮助；免费档会被钳制在50，前端已做分块兜底）
[limits]
cpu_ms = 100
subrequests = 1000

# D1 数据库绑定 — 原来的 wps-import-db（与 wps-import-site 共享同一库）
[[d1_databases]]
binding = "DB"
database_name = "wps-import-db"
database_id = "2808169d-afaf-457d-a93a-d7f83b07ef1b"

# KV 绑定 — 原来的 SITE_KV（与 wps-import-site 共享同一 KV）
[[kv_namespaces]]
binding = "SITE_KV"
id = "17a13e57cc4043ce9d4ee41686ec4606"
