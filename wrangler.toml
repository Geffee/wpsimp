name = "wpsimpmoyu2"
compatibility_date = "2024-12-01"
pages_build_output_dir = "public"

# 提高单次 Worker 调用的子请求上限（大表分块导入时仍有帮助；免费档会被钳制在50，前端已做分块兜底）
[limits]
cpu_ms = 100
subrequests = 1000

# D1 数据库绑定 — 部署后替换 database_id
[[d1_databases]]
binding = "DB"
database_name = "wpsimpmoyu2-db"
database_id = "f8d81afc-8115-4459-8e77-c13e77c2343d"

# KV 绑定 — wpsimpmoyu2 独立 KV（binding 名必须为 SITE_KV，与后端 env.SITE_KV 对应）
[[kv_namespaces]]
binding = "SITE_KV"
id = "ba72219c3286432daec7f53386379e86"
